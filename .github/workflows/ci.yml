name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      # 不拉 LFS：测试与构建都不需要真实模型/字体二进制，省 LFS 带宽配额
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci --no-audit --no-fund

      - name: 运行测试
        run: npm test

      - name: 构建前端
        run: npm run build
